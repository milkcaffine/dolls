<title>Gallery</title>
<style>
  body {
    font-family: sans-serif;
    margin: 40px;
    background: #fafafa;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 16px;
  }

  .item {
    text-align: center;
  }

  .item img {
    width: 100%;
    aspect-ratio: 1 / 1;     /* 정사각형 고정 */
    object-fit: cover;        /* 비율 안깨지게 잘라서 채움 */
    display: block;
    border-radius: 6px;
  }

  .item p {
    margin: 8px 0 0;
    font-size: 14px;
    color: #333;
  }
</style>
</head>
