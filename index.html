<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>davidbowie.kr | Doll Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', system-ui, sans-serif; }
        .hero { background: linear-gradient(135deg, #1a1a2e, #16213e); }
        .gallery img {
            transition: all 0.3s ease;
        }
        .gallery img:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        .item {
            position: relative;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- Header -->
    <header class="hero py-12 text-center">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-4xl font-bold mb-2">davidbowie.kr</h1>
            <p class="text-zinc-400">Marsko's Super Dollfie Gallery</p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">

        <!-- VOLKS -->
        <section class="mb-16">
            <h2 class="text-3xl font-semibold mb-8 border-b border-zinc-700 pb-3">VOLKS</h2>
            <div class="gallery grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-6">
                <!-- 이미지들 추가 (필요하면 더 복붙) -->
                <div class="item group">
                    <img src="images/01.jpg" alt="Licht 1" class="w-full aspect-square object-cover rounded-lg">
                    <p class="mt-2 text-sm text-zinc-400 text-center">Licht 1</p>
                </div>
                <div class="item group">
                    <img src="images/02.jpg" alt="Licht 2" class="w-full aspect-square object-cover rounded-lg">
                    <p class="mt-2 text-sm text-zinc-400 text-center">Licht 2</p>
                </div>
                <!-- ... 나머지 VOLKS 이미지들도 동일 형식으로 -->
                <div class="item group">
                    <img src="images/36.jpg" alt="Legulus 4" class="w-full aspect-square object-cover rounded-lg">
                    <p class="mt-2 text-sm text-zinc-400 text-center">Legulus 4</p>
                </div>
            </div>
        </section>

        <!-- SWITCH -->
        <section>
            <h2 class="text-3xl font-semibold mb-8 border-b border-zinc-700 pb-3">SWITCH</h2>
            <div class="gallery grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-6">
                <div class="item group">
                    <img src="images/101.jpg" alt="gyoha d rw 1" class="w-full aspect-square object-cover rounded-lg">
                    <p class="mt-2 text-sm text-zinc-400 text-center">gyoha d rw 1</p>
                </div>
                <!-- ... SWITCH 이미지들 동일 형식으로 복붙 -->
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="text-center py-10 text-zinc-500 text-sm border-t border-zinc-800">
        <div class="max-w-4xl mx-auto px-6">
            © 2026 Marsko • Super Dollfie Collection<br>
            <a href="https://x.com/RMars2675" target="_blank" class="hover:text-zinc-300">X @RMars2675</a> 
            • 
            <a href="/" class="hover:text-zinc-300">Marsko Portfolio</a>
        </div>
    </footer>

</body>
</html>
